<!-- @dsCard group="Dashboard" name="Deal detail" subtitle="Expanded row: source, pillars, Victor vs ours, card" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1"><title>Deal Hunter — Deal detail</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<style>
  :root {
    --page:#f9f9f7; --surface:#fcfcfb; --ink:#0b0b0b; --ink-2:#52514e; --muted:#898781;
    --grid:#e1e0d9; --baseline:#c3c2b7; --ring:rgba(11,11,11,.10);
    --good:#0ca30c; --warning:#fab219; --serious:#ec835a; --critical:#d03b3b;
    --good-text:#006300; --accent:#2a78d6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --page:#0d0d0d; --surface:#1a1a19; --ink:#ffffff; --ink-2:#c3c2b7;
      --grid:#2c2c2a; --baseline:#383835; --ring:rgba(255,255,255,.10);
      --good-text:#0ca30c; --accent:#3987e5;
    }
  }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--page); color:var(--ink);
         font:14px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif; padding:20px; }

  .badge { display:inline-flex; align-items:center; gap:6px; padding:2px 10px 2px 8px;
    border-radius:999px; font-size:12.5px; font-weight:650; border:1px solid var(--ring); }
  .badge .dot { width:9px; height:9px; border-radius:50%; }
  .b-PASS { background:color-mix(in srgb, var(--good) 14%, transparent); } .b-PASS .dot { background:var(--good); }
  .b-BORDERLINE { background:color-mix(in srgb, var(--warning) 16%, transparent); } .b-BORDERLINE .dot { background:var(--warning); }
  .b-FAIL { background:color-mix(in srgb, var(--serious) 15%, transparent); } .b-FAIL .dot { background:var(--serious); }
  .b-KILLED { background:color-mix(in srgb, var(--muted) 14%, transparent); color:var(--ink-2); } .b-KILLED .dot { background:var(--muted); }

  .pchip { display:inline-flex; align-items:center; justify-content:center;
    width:21px; height:21px; border-radius:6px; margin-right:3px; font-size:11.5px;
    font-weight:750; border:1px solid var(--ring); color:var(--ink); }
  .pg-A { background:color-mix(in srgb, var(--good) 18%, transparent); }
  .pg-B { background:color-mix(in srgb, var(--accent) 16%, transparent); }
  .pg-C { background:color-mix(in srgb, var(--warning) 20%, transparent); }
  .pg-D { background:color-mix(in srgb, var(--critical) 18%, transparent); }
  .pg-none { color:var(--muted); background:transparent; }
  .prov-estimated { border-style:dashed; }
  .prov-victor { border-width:2px; border-color:color-mix(in srgb, var(--ink) 45%, transparent); }
  svg{width:17px;height:17px;display:block} a{color:var(--accent);text-decoration:none} h3{font-size:15px;margin:14px 0 6px}
</style></head><body><div id="root"></div>
<script type="text/babel">
const PILLARS = [
  { key:'asset', name:'Asset Quality', grade:null, cls:'pg-none', icon:<path d="M4 21V5a1 1 0 0 1 1-1h9a1 1 0 0 1 1 1v16"/>, note:'no data', sub:<path d="M15 9h4a1 1 0 0 1 1 1v11"/>, sub2:<path d="M2 21h20"/>, sub3:<path d="M8 8h2M8 12h2M8 16h2"/> },
  { key:'vacancy', name:'Vacancy Risk', grade:'D', cls:'pg-D', note:'market occupancy 60% below the 65% minimum', icon:<circle cx="8" cy="15" r="4"/>, sub:<path d="m11 12 9-9M17 4l3 3M14 7l2 2"/> },
  { key:'cashflow', name:'Cash-Flow Margin', grade:'B', cls:'pg-B', note:'CoC 11.0% · real taxes $1,942 (Redfin) vs $5,040 assumed', icon:<ellipse cx="12" cy="6" rx="7" ry="3"/>, sub:<path d="M5 6v6c0 1.7 3.1 3 7 3s7-1.3 7-3V6"/>, sub2:<path d="M5 12v6c0 1.7 3.1 3 7 3s7-1.3 7-3v-6"/> },
];
const GRADE_COLOR = { A:'var(--good)', B:'var(--accent)', C:'var(--warning)', D:'var(--critical)', null:'var(--muted)' };

const DEFAULTS = /*EDITMODE-BEGIN*/{
  "verdictTreatment": "banner",
  "pillarLayout": "list",
  "density": "compact"
}/*EDITMODE-END*/;

function PillarIcon({ p }) {
  return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">{p.icon}{p.sub}{p.sub2}{p.sub3}</svg>;
}

function App() {
  const [t, setTweak] = window.useTweaks(DEFAULTS);
  const comfy = t.density === 'comfortable';
  const pad = comfy ? 26 : 18;
  const gap = comfy ? 18 : 6;
  const bodyFont = comfy ? 15 : 13.5;

  return (
    <div style={{ background:'var(--surface)', border:'1px solid var(--ring)', borderRadius:12, padding:pad, maxWidth: t.pillarLayout==='grid' ? 860 : 780, fontSize:bodyFont }}>

      {t.verdictTreatment === 'banner' ? (
        <div style={{ margin:`-${pad}px -${pad}px ${pad}px`, padding:`${comfy?22:16}px ${pad}px`, borderRadius:'12px 12px 0 0',
          background:'color-mix(in srgb, var(--warning) 88%, var(--surface))', color:'#1a1300', display:'flex', alignItems:'center', gap:14 }}>
          <span style={{ fontWeight:800, fontSize:comfy?26:20, letterSpacing:'-.01em' }}>BORDERLINE</span>
          <b style={{ fontSize:comfy?20:16 }}>106 Bartleson Deer Trl</b>
          <span style={{ opacity:.75 }}>Greentown, PA · STR ⛰️</span>
          <span style={{ fontWeight:800, marginLeft:'auto', fontSize:comfy?32:24 }}>74</span>
        </div>
      ) : (
        <div style={{ display:'flex', gap:14, alignItems:'center' }}>
          <span className="badge b-BORDERLINE"><span className="dot"></span>BORDERLINE</span>
          <b style={{ fontSize:16 }}>106 Bartleson Deer Trl</b>
          <span style={{ color:'var(--ink-2)' }}>Greentown, PA · STR ⛰️</span>
          <span style={{ fontWeight:650, marginLeft:'auto', fontSize:20 }}>74</span>
        </div>
      )}

      <h3>Source</h3>
      <p style={{ fontSize:bodyFont-.5, color:'var(--ink-2)' }}><b style={{ color:'var(--ink)' }}>The Offer Sheet</b> · "July 11: 13 Potential STRs" · <a href="#">open source email ↗</a> · <a href="#">listing ↗</a></p>

      <h3>Four pillars <span style={{ fontWeight:400, color:'var(--muted)', fontSize:12 }}>(Victor Steffen methodology)</span></h3>

      {t.pillarLayout === 'grid' ? (
        <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:comfy?14:10, margin:'10px 0' }}>
          {PILLARS.map(p => (
            <div key={p.key} style={{ border:'1px solid var(--ring)', borderRadius:10, padding:comfy?16:12, display:'flex', flexDirection:'column', gap:8 }}>
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <PillarIcon p={p} />
                <span style={{ fontWeight:650, fontSize:12.5 }}>{p.name}</span>
              </div>
              <div style={{ width:comfy?54:42, height:comfy?54:42, borderRadius:10, display:'flex', alignItems:'center', justifyContent:'center',
                fontWeight:800, fontSize:comfy?24:19, color: p.grade ? '#fff' : 'var(--muted)',
                background: p.grade ? GRADE_COLOR[p.grade] : 'transparent', border: p.grade ? 'none' : '1px dashed var(--ring)' }}>
                {p.grade || '—'}
              </div>
              <span style={{ color:'var(--ink-2)', fontSize:12, textTransform: p.grade ? 'none' : 'uppercase' }}>{p.note}</span>
            </div>
          ))}
        </div>
      ) : (
        PILLARS.map(p => (
          <div key={p.key} style={{ display:'flex', alignItems:'center', gap:10, margin:`${gap}px 0` }}>
            <PillarIcon p={p} />
            <span style={{ minWidth:122, fontWeight:600 }}>{p.name}</span>
            <span className={`pchip ${p.cls}`}>{p.grade || '—'}</span>
            <span style={{ color: p.grade ? 'var(--ink-2)' : 'var(--muted)', fontSize: p.grade ? 13 : 11, textTransform: p.grade ? 'none' : 'uppercase' }}>{p.note}</span>
          </div>
        ))
      )}

      <h3>Red flags</h3>
      <ul style={{ paddingLeft:20, color:'var(--ink-2)', fontSize:bodyFont-1 }}>
        <li>income is SELLER-CLAIMED and was recomputed — verify independently</li>
        <li>STR legality: UNVERIFIED — human-verify HOA + ordinance before any offer</li>
        <li>non-destination check: n/a — Poconos destination market ⛰️</li>
      </ul>

      <h3>Deal card</h3>
      <pre style={{ background:'var(--page)', border:'1px solid var(--ring)', borderRadius:10, padding:14, overflowX:'auto', fontSize:12.5, whiteSpace:'pre-wrap', wordBreak:'break-word', maxWidth:'100%' }}>{`PILLARS (Victor Steffen methodology)
  Cash-Flow Margin B  [computed]  CoC 11.0% at/above buy-box min
PURCHASE  List: $420,000  Down: 15% ($63,000)  LTV: 85%
CASH FLOW  NOI $37,825   Debt Service $29,544   $690/mo ($8,281/yr)`}</pre>

      <window.TweaksPanel>
        <window.TweakSection label="Header" />
        <window.TweakRadio label="Verdict treatment" value={t.verdictTreatment}
          options={['badge', 'banner']} onChange={v => setTweak('verdictTreatment', v)} />
        <window.TweakSection label="Pillars" />
        <window.TweakRadio label="Pillar layout" value={t.pillarLayout}
          options={['list', 'grid']} onChange={v => setTweak('pillarLayout', v)} />
        <window.TweakSection label="Spacing" />
        <window.TweakRadio label="Density" value={t.density}
          options={['compact', 'comfortable']} onChange={v => setTweak('density', v)} />
      </window.TweaksPanel>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body></html>
